<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive AI assistant to help you learn the election process in India.">
    <title>Election Learning Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="app-container" role="main">

        <!-- LEFT: CHOICES -->
        <aside class="sidebar choices-panel" aria-label="Journey Progress and Choices">
            <div class="panel-header" role="banner">
                <i class="fas fa-route" aria-hidden="true"></i>
                <h2>Your Journey</h2>
            </div>

            <div class="quiz-container">
                <div class="progress-container" aria-label="Step Progress">
                    <div class="progress-bar">
                        <div id="progress" class="progress" style="width: 0%" role="progressbar" aria-valuenow="0"
                            aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>

                <div id="mentor-box" class="mentor-box" aria-live="polite">
                    <div class="mentor-icon" aria-hidden="true"><i class="fas fa-lightbulb"></i></div>
                    <div class="mentor-content">
                        <span class="mentor-label">MENTOR HINT</span>
                        <p id="mentor-hint">Initializing your mentor...</p>
                    </div>
                </div>

                <div id="quiz-card" class="quiz-card" aria-labelledby="scenario-title">
                    <h3 id="scenario-title">Step 1: Eligibility</h3>
                    <p id="scenario-text">Loading question...</p>

                    <div id="options-container" class="options-grid" role="group" aria-label="Selection Options">
                        <!-- Options injected here -->
                    </div>
                </div>

                <div id="feedback-message" class="feedback-message" aria-live="assertive"></div>
            </div>
        </aside>

        <!-- CENTER: SIMULATION -->
        <main class="main-content simulation-panel" aria-label="Live Simulation View">
            <div class="panel-header" role="banner">
                <i class="fas fa-project-diagram" aria-hidden="true"></i>
                <h2>Process Simulation</h2>
            </div>

            <div class="simulation-view">
                <div id="simulation-log" class="simulation-log" aria-live="polite">
                    <div class="empty-state">
                        <i class="fas fa-ghost" aria-hidden="true"></i>
                        <p>Make a choice to see the process unfold...</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- RIGHT: CHAT -->
        <aside class="sidebar chat-panel" aria-label="AI Assistant Chat">
            <div class="panel-header" role="banner">
                <i class="fas fa-robot" aria-hidden="true"></i>
                <h2>AI Assistant</h2>
            </div>

            <div id="chat-messages" class="chat-messages" aria-live="polite" aria-relevant="additions">
                <div class="msg-wrapper ai">
                    <div class="msg-bubble ai">Hello! I'm your Election Guide. How can I help you today?</div>
                </div>
            </div>

            <div class="chat-input-area">
                <input id="chat-input" type="text" placeholder="Ask about voting..." aria-label="Type your message here"
                    autocomplete="off">
                <button id="chat-send" aria-label="Send message"><i class="fas fa-paper-plane"
                        aria-hidden="true"></i></button>
            </div>
        </aside>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDypFNOFBwp0cxPkD1_Uczmv7Cq2ehBgks",
            authDomain: "promptvars-challenge-2.firebaseapp.com",
            projectId: "promptvars-challenge-2",
            storageBucket: "promptvars-challenge-2.firebasestorage.app",
            messagingSenderId: "882610711158",
            appId: "1:882610711158:web:24d0c8def971f2f6964d57",
            measurementId: "G-Y2X56GTM7R"
        };

        // Unique Session ID for interaction grouping
        const sessionId = "sess_" + Math.random().toString(36).substr(2, 9);

        try {
            const app = initializeApp(firebaseConfig);
            const analytics = getAnalytics(app);
            const db = getFirestore(app);

            // Expose globally for modular JS access
            window.analytics = analytics;
            window.db = db;
            window.logEvent = logEvent;

            /**
             * Enhanced Telemetry Utility
             * Unified logging to Firestore (audit log) and Analytics (metrics)
             */
            window.logUserAction = async (action, data = {}) => {
                const payload = {
                    action,
                    sessionId,
                    ...data,
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent
                };

                try {
                    // 1. Fire and forget to Google Analytics
                    logEvent(analytics, action, { session_id: sessionId, ...data });

                    // 2. Persist to Firestore Interactions collection
                    await addDoc(collection(db, "interactions"), payload);

                    console.log(`📊 [Telemetry] ${action} logged.`);
                } catch (err) {
                    console.warn("⚠️ Telemetry deferred:", err.message);
                }
            };

            // Initial load event
            window.logUserAction("session_start", { page: "home" });

            // Manual Test Function
            window.testAnalytics = () => window.logUserAction("manual_verify", { test: true });

        } catch (error) {
            console.error("❌ Firebase Failed to load:", error);
        }
    </script>

    <!-- Ordered plain script loading -->
    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
    <script src="js/test.js"></script>

    <div style="position: fixed; bottom: 20px; left: 20px; z-index: 10000;">
        <button onclick="runAllTests()" style="padding: 10px 22px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" aria-label="Launch automated system diagnostics">
            Audit System
        </button>
    </div>

</body>

</html>
