<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive AI assistant to help you learn the election process in India.">
    <title>Election Learning Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="app-container" role="main">
        
        <!-- LEFT: CHOICES -->
        <aside class="sidebar choices-panel" aria-label="Journey Progress and Choices">
            <div class="panel-header" role="banner">
                <i class="fas fa-route" aria-hidden="true"></i>
                <h2>Your Journey</h2>
            </div>
            
            <div class="quiz-container">
                <div class="progress-container" aria-label="Step Progress">
                    <div class="progress-bar">
                        <div id="progress" class="progress" style="width: 0%" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>

                <div id="mentor-box" class="mentor-box" aria-live="polite">
                    <div class="mentor-icon" aria-hidden="true"><i class="fas fa-lightbulb"></i></div>
                    <div class="mentor-content">
                        <span class="mentor-label">MENTOR HINT</span>
                        <p id="mentor-hint">Initializing your mentor...</p>
                    </div>
                </div>

                <div id="quiz-card" class="quiz-card" aria-labelledby="scenario-title">
                    <h3 id="scenario-title">Step 1: Eligibility</h3>
                    <p id="scenario-text">Loading question...</p>
                    
                    <div id="options-container" class="options-grid" role="group" aria-label="Selection Options">
                        <!-- Options injected here -->
                    </div>
                </div>

                <div id="feedback-message" class="feedback-message" aria-live="assertive"></div>
            </div>
        </aside>

        <!-- CENTER: SIMULATION -->
        <main class="main-content simulation-panel" aria-label="Live Simulation View">
            <div class="panel-header" role="banner">
                <i class="fas fa-project-diagram" aria-hidden="true"></i>
                <h2>Process Simulation</h2>
            </div>
            
            <div class="simulation-view">
                <div id="simulation-log" class="simulation-log" aria-live="polite">
                    <div class="empty-state">
                        <i class="fas fa-ghost" aria-hidden="true"></i>
                        <p>Make a choice to see the process unfold...</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- RIGHT: CHAT -->
        <aside class="sidebar chat-panel" aria-label="AI Assistant Chat">
            <div class="panel-header" role="banner">
                <i class="fas fa-robot" aria-hidden="true"></i>
                <h2>AI Assistant</h2>
            </div>
            
            <div id="chat-messages" class="chat-messages" aria-live="polite" aria-relevant="additions">
                <div class="msg-wrapper ai">
                    <div class="msg-bubble ai">Hello! I'm your Election Guide. How can I help you today?</div>
                </div>
            </div>

            <div class="chat-input-area">
                <input id="chat-input" type="text" placeholder="Ask about voting..." aria-label="Type your message here" autocomplete="off">
                <button id="chat-send" aria-label="Send message"><i class="fas fa-paper-plane" aria-hidden="true"></i></button>
            </div>
        </aside>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        // IMPORTANT: Ensure you replace these with your ACTUAL config from Firebase Console
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID",
            measurementId: "YOUR_MEASUREMENT_ID" // REQUIRED for Analytics
        };

        try {
            // Initialize Firebase
            const app = initializeApp(firebaseConfig);
            const analytics = getAnalytics(app);

            // Expose globally for vanilla JS access
            window.analytics = analytics;
            window.logEvent = logEvent;

            // Manual Test Function
            window.testAnalytics = () => {
                if (window.analytics && window.logEvent) {
                    window.logEvent(window.analytics, 'manual_test_event', { timestamp: Date.now() });
                    console.log("✅ Analytics: Manual test event sent");
                } else {
                    console.error("❌ Analytics: Global objects not found");
                }
            };

            console.log("🚀 Firebase Analytics initialized successfully");
            
            // Guaranteed Initial Event
            logEvent(analytics, 'app_loaded');
            console.log("📊 Analytics Event: app_loaded");

        } catch (error) {
            console.error("❌ Firebase Initialization Error:", error);
        }
    </script>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/chat.js"></script>
</body>
</html>
